[workspace]
value_file = "signac_statepoint.json"

[default.action]
command = "python actions.py --action $ACTION_NAME {directories}"

[[action]]
name = "run_jobs"
products = ['summary.txt']
launchers = ["mpi"]
group.maximum_size = 1

[action.resources]
processes.per_directory = 1
walltime.per_submission = "00:10:00"

[action.submit_options.borah]
setup = "module load openmpi"
output_file_name = "out/{action_name}-%j.out"
partition = "gpu-l40"
