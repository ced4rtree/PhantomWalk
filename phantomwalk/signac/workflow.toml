[workspace]
value_file = "signac_statepoint.json"

[default.action]
command = "python actions.py --action $ACTION_NAME {directories}"

[[action]]
name = "potential_energy_graph"
products = ['pe.svg']
launchers = ["openmp"]
group.maximum_size = 243
previous_actions = ['compute_data']

[action.resources]
threads_per_process = 1
walltime.per_submission = "00:02:30"

[[action]]
name = "rdf"
products = ['rdf.svg']
launchers = ["openmp"]
group.maximum_size = 243
previous_actions = ['compute_data']

[action.resources]
threads_per_process = 1
walltime.per_submission = "00:02:30"

[[action]]
name = "compute_data"
products = ['summary.txt','log.txt','trajectory.gsd']
launchers = ["openmp"]
group.maximum_size = 243

[action.resources]
gpus_per_process = 1
threads_per_process = 2
walltime.per_submission = "16:00:00"

[action.submit_options.borah]
setup = "module load openmpi"
custom = ["--gres=gpu:1"]
output_file_name = "out/{action_name}-%j.out"
partition = "gpu-l40"
